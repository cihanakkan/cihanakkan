<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cihan Akkan | 6. Sınıf Akademik Portal</title>
    <style>
        /* Kırmızı Espor / MPL Tarzı Parlayan Koyu Tema */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #0d080a;
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 950px;
            background: rgba(20, 15, 17, 0.75);
            border: 1px solid rgba(239, 68, 68, 0.2);
            border-radius: 24px;
            padding: 40px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.6), inset 0 1px 2px rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
        }

        .logo {
            font-size: 1.8rem;
            font-weight: 900;
            letter-spacing: 2px;
            color: #ef4444;
            margin-bottom: 10px;
            text-transform: uppercase;
            text-shadow: 0 0 15px rgba(239, 68, 68, 0.5);
        }

        .logo span {
            color: #ffffff;
        }

        h1 {
            font-size: 2.2rem;
            font-weight: 800;
            margin-bottom: 35px;
            background: linear-gradient(to right, #ffffff, #cbd5e1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .lessons-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 16px;
            margin-bottom: 40px;
        }

        .lesson-card {
            background: #181113;
            border: 1px solid rgba(255, 255, 255, 0.04);
            border-radius: 16px;
            padding: 25px 15px;
            text-decoration: none;
            color: #cbd5e1;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }

        .lesson-card:hover {
            border-color: #ef4444;
            background: rgba(239, 68, 68, 0.06);
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(239, 68, 68, 0.2);
            color: #ffffff;
        }

        .lesson-card .icon {
            font-size: 2.2rem;
            filter: drop-shadow(0 0 8px rgba(255,255,255,0.1));
            transition: transform 0.3s;
        }

        .lesson-card:hover .icon {
            transform: scale(1.1);
        }

        .lesson-card span.title {
            font-size: 1rem;
            font-weight: 600;
        }

        .divider {
            border: 0;
            height: 1px;
            background: linear-gradient(to right, transparent, rgba(239, 68, 68, 0.3), transparent);
            margin: 35px 0;
        }

        .routing-title {
            color: #78716c;
            font-size: 0.95rem;
            font-weight: 600;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-group {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .action-btn {
            background: linear-gradient(135deg, #dc2626, #991b1b);
            color: #ffffff;
            padding: 14px 28px;
            font-size: 1rem;
            font-weight: 700;
            border-radius: 12px;
            text-decoration: none;
            transition: all 0.2s ease;
            box-shadow: 0 4px 15px rgba(220, 38, 38, 0.3);
            border: 1px solid rgba(239, 68, 68, 0.4);
        }

        .action-btn:hover {
            transform: translateY(-2px);
            background: linear-gradient(135deg, #ef4444, #dc2626);
            box-shadow: 0 0 20px rgba(239, 68, 68, 0.6);
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="logo">CIHAN<span>AKKAN</span></div>
        <h1>6. Sınıf Akademik Portal</h1>
        
        <div class="lessons-grid">
            <a href="/turkce" class="lesson-card">
                <span class="icon">✍️</span>
                <span class="title">Türkçe</span>
            </a>
            <a href="/matematik" class="lesson-card">
                <span class="icon">🔢</span>
                <span class="title">Matematik</span>
            </a>
            <a href="/sosyal" class="lesson-card">
                <span class="icon">🌍</span>
                <span class="title">Sosyal Bilgiler</span>
            </a>
            <a href="/fen" class="lesson-card">
                <span class="icon">🧪</span>
                <span class="title">Fen Bilimleri</span>
            </a>
            <a href="/bilisim" class="lesson-card">
                <span class="icon">💻</span>
                <span class="title">Bilişim</span>
            </a>
        </div>

        <hr class="divider">

        <div class="routing-title">🚀 Hızlı Proje Bağlantıları (Routing):</div>
        <div class="btn-group">
            <a href="/turkce" class="action-btn">Türkçe Sınavı'na Git ➔</a>
        </div>
    </div>

</body>
</html>
